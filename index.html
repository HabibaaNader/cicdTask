<!DOCTYPE html>
<html>
<head>
    <title>My Jenkins CI/CD Site</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid #007bff;
        }
        h1 { color: #333; }
        p { color: #666; }
        .status {
            display: inline-block;
            padding: 5px 15px;
            background: #28a745;
            color: white;
            border-radius: 20px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="status">Deployed via Jenkins</div>
        <h1>Habiba's Website</h1>
        <p>This page was built and deployed automatically using Docker!</p>
    </div>
</body>
</html>
